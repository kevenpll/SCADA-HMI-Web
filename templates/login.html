<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito | SCADA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <div class="login-box">
        <div class="login-brand">
            <i class="ph-fill ph-cpu brand-icon-large"></i>
            <h1>Enterprise SCADA</h1>
            <p>Controle e Monitoramento Industrial</p>
        </div>

        {% if error %}
        <div class="alert alert-error">
            <i class="ph-fill ph-warning-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('routes.login') }}" class="login-form">
            <div class="input-group">
                <label for="username">Matrícula / Usuário</label>
                <div class="input-with-icon">
                    <i class="ph ph-user"></i>
                    <input type="text" id="username" name="username" placeholder="Digite seu usuário" required autofocus autocomplete="off">
                </div>
            </div>

            <div class="input-group">
                <label for="password">Senha de Acesso</label>
                <div class="input-with-icon">
                    <i class="ph ph-lock-key"></i>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Conectar ao Sistema <i class="ph ph-arrow-right"></i>
            </button>
        </form>
        
        <div class="login-hint">
            <i class="ph ph-info"></i> Acesso padrão: admin / admin
        </div>
    </div>
</body>
</html>
